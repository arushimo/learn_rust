version: '3.8'

services:
  api:
    build: .
    ports:
      - "50051:50051"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-pass}@db:5432/${POSTGRES_DB:-ev_db}
      - RUST_LOG=${RUST_LOG:-info}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317 # JaegerのgRPCポート
    depends_on:
      - db
      - jaeger

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pass}
      - POSTGRES_DB=${POSTGRES_DB:-ev_db}
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:latest
    ports:
      - "16686:16686" # Jaeger Web UI
      - "4317:4317"   # OTLP gRPC endpoint
