name: CI Pipeline

on:
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ev_charging_api
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "ev_charging_api"
      - name: Run cargo fmt
        run: cargo fmt --all -- --check
      - name: Run cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ev_charging_api
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: ev_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      jaeger:
        image: cr.jaegertracing.io/jaegertracing/jaeger:latest
        ports:
          - 4317:4317 # OTLP gRPC endpoint

    steps:
      - uses: actions/checkout@v4
      - name: Map jaeger hostname
        run: echo "127.0.0.1 jaeger" | sudo tee -a /etc/hosts
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "ev_charging_api"
      - name: Setup Database Schema
        env:
          PGPASSWORD: pass
        run: psql -h localhost -U user -d ev_db -f init.sql
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Start API Server in background
        env:
          DATABASE_URL: postgres://user:pass@localhost:5432/ev_db
        run: |
          cargo run &
          timeout 15 bash -c 'until echo > /dev/tcp/localhost/50051 2>/dev/null; do sleep 1; done' || echo "Timeout waiting for server"
      - name: Run tests
        env:
          DATABASE_URL: postgres://user:pass@localhost:5432/ev_db
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

  docker-dry-run:
    name: Docker Build Dry-Run
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./ev_charging_api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
