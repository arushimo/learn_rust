<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Watermelon WASM Prototype</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f7fb;
        color: #17202a;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .game-shell {
        display: grid;
        gap: 12px;
      }

      .status {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
        line-height: 1.4;
      }

      canvas {
        width: min(92vw, 480px);
        height: min(calc(92vw * 4 / 3), 640px);
        max-height: 86vh;
        display: block;
        background: #fffdf7;
        border: 4px solid #293241;
        border-top: 0;
        touch-action: manipulation;
      }
    </style>
  </head>
  <body>
    <main class="game-shell">
      <div class="status">
        <strong>Watermelon WASM</strong>
        <span>クリック / タップで投入</span>
      </div>
      <canvas id="game" width="480" height="640" aria-label="Watermelon game canvas"></canvas>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
